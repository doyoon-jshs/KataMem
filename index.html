<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="히라가나 표와 빠른 퀴즈로 글자별 암기 상태를 표시하는 심플한 웹앱"
    />
    <meta name="format-detection" content="telephone=no, email=no, address=no, date=no" />
    <title>ひらがな - KanaMem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/kana-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260722-ios-color" />
  </head>
  <body>
    <main class="app-shell">
      <section class="practice-pane" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">KanaMem</p>
            <h1 id="app-title">
              <span>ひらがな</span>
            </h1>
          </div>
        </header>

        <div class="script-switch" aria-label="문자 종류">
          <button class="script-button active" type="button" data-script="hiragana">히라가나</button>
          <button class="script-button" type="button" data-script="katakana">가타카나</button>
        </div>

        <nav class="mode-tabs" aria-label="학습 모드">
          <button class="tab active" type="button" data-mode="chart">표</button>
          <button class="tab" type="button" data-mode="quiz">퀴즈</button>
        </nav>

        <section class="mode-panel" id="quiz-panel" aria-live="polite">
          <div class="quiz-head">
            <div class="quiz-tools">
              <div class="quiz-type" aria-label="퀴즈 종류">
                <button class="type-button active" type="button" data-quiz-type="cards">카드형</button>
                <button class="type-button" type="button" data-quiz-type="table">전체표</button>
              </div>
            </div>
          </div>
          <div class="quiz-question">
            <div class="kana-symbol small" id="quiz-kana">あ</div>
          </div>
          <div class="answer-grid" id="answer-grid"></div>
        </section>

        <section class="mode-panel active" id="chart-panel">
          <div class="chart-toolbar">
            <p class="row-label">아는 글자는 눌러서 표시</p>
            <button class="secondary-button compact" id="review-weak" type="button">헷갈린 글자부터</button>
          </div>
          <div class="kana-chart" id="kana-chart"></div>
          <div class="chart-progress" aria-label="진척도">
            <div class="progress-ring" aria-label="암기 완료율">
              <span id="mastered-percent">0%</span>
            </div>
            <div class="stats-grid">
              <div>
                <span id="total-count">46</span>
                <p>전체</p>
              </div>
              <div>
                <span id="mastered-count">0</span>
                <p>알고 있음</p>
              </div>
              <div>
                <span id="weak-count">0</span>
                <p>복습 필요</p>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js?v=20260722-ios-color"></script>
  </body>
</html>
